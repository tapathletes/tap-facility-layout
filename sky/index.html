<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TAP Athletes — Facility 3D (Sky Blue Turf)</title>
<style>
  :root {
    --slate: #3a4a55;
    --slate-deep: #2a3640;
    --powder: #b8d4e0;
    --paper: #f5f8fb;
    --ink: #1a232b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0d12;
    color: #e6ecf2;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .hud {
    position: fixed;
    pointer-events: none;
    color: #e6ecf2;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .hud.top-left   { top: 16px; left: 16px; }
  .hud.top-right  { top: 16px; right: 16px; text-align: right; }
  .hud .title {
    font-weight: 800; font-size: 18px; letter-spacing: 2px;
    color: #fff;
  }
  .hud .sub {
    font-weight: 500; font-size: 11px; letter-spacing: 3px;
    color: #b8d4e0; margin-top: 2px;
  }
  .hud .mono {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px; letter-spacing: 1.5px; opacity: 0.8;
  }

  .panel {
    position: fixed;
    top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(20, 28, 36, 0.88);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(184, 212, 224, 0.2);
    border-radius: 6px;
    padding: 6px;
    display: flex;
    gap: 4px;
    pointer-events: auto;
    z-index: 10;
  }
  .panel button {
    background: transparent;
    color: #b8d4e0;
    border: 1px solid transparent;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 4px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .panel button:hover { background: rgba(184, 212, 224, 0.12); }
  .panel button.active {
    background: #3a4a55;
    color: #fff;
    border-color: rgba(184, 212, 224, 0.4);
  }
  .panel .divider {
    width: 1px;
    background: rgba(184, 212, 224, 0.15);
    margin: 4px 2px;
  }

  .help {
    position: fixed;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(20, 28, 36, 0.88);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(184, 212, 224, 0.15);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #b8d4e0;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    pointer-events: none;
    z-index: 10;
  }
  .help kbd {
    display: inline-block;
    background: #3a4a55;
    color: #fff;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 10px;
    margin: 0 2px;
  }

  #lock-hint {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(8, 12, 18, 0.78);
    backdrop-filter: blur(4px);
    z-index: 20;
    cursor: pointer;
    pointer-events: auto;
  }
  #lock-hint.show { display: flex; }
  #lock-hint .card {
    background: #1a232b;
    border: 1px solid rgba(184, 212, 224, 0.3);
    border-radius: 8px;
    padding: 28px 36px;
    text-align: center;
    max-width: 360px;
  }
  #lock-hint .card h2 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 8px;
  }
  #lock-hint .card p {
    font-size: 12px;
    letter-spacing: 1px;
    color: #b8d4e0;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  #lock-hint .card .cta {
    background: #b8d4e0;
    color: #1a232b;
    padding: 10px 20px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="panel" id="mode-panel">
    <button data-mode="orbit" class="active">Orbit</button>
    <button data-mode="walk">Walk</button>
    <div class="divider"></div>
    <button data-preset="iso">Iso</button>
    <button data-preset="top">Top</button>
    <button data-preset="mound">From Mound</button>
    <button data-preset="plate">From Plate</button>
    <button data-preset="entry">Entry</button>
    <div class="divider"></div>
    <button id="bay-door-toggle">Bay Door</button>
  </div>

  <div class="hud top-left">
    <div class="title">TAP ATHLETES</div>
    <div class="sub">PITCHING ACADEMY · FACILITY 3D</div>
  </div>

  <div class="hud top-right">
    <div class="mono">25' W × 80' L · CAGE 12' × 72'</div>
    <div class="mono" id="cam-info" style="margin-top: 6px; opacity: 0.55;">orbit</div>
  </div>

  <div class="help" id="help-orbit">
    <kbd>L-DRAG</kbd> rotate · <kbd>R-DRAG</kbd> pan · <kbd>SCROLL</kbd> zoom
  </div>
  <div class="help" id="help-walk" style="display:none;">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move · <kbd>MOUSE</kbd> look · <kbd>SHIFT</kbd> run · <kbd>ESC</kbd> exit
  </div>

  <div id="lock-hint">
    <div class="card">
      <h2>WALK MODE</h2>
      <p>Click to enter the facility. Use WASD to move, mouse to look around. Press <kbd style="background:#3a4a55;color:#fff;padding:1px 5px;border-radius:2px;font-size:10px;">ESC</kbd> to exit.</p>
      <div class="cta">CLICK TO START</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { Reflector } from 'three/addons/objects/Reflector.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    /* ─────────────────────────────────────────────────────────────────
       Coordinate system (world units = feet) — LONG AXIS ALONG X:
         x: 0 .. 80  (length, FRONT wall to BACK wall)
         z: 0 .. 25  (width, LEFT wall to RIGHT wall)
         y: 0 .. 14  (height, floor to ceiling)
       Concrete pads:  x = 0..3 (front entry) and x = 77..80 (back exit)
       Pitching cage:  x = 5..77, z = 1.17..13.17, y = 0..11   (12' × 72' × 11')
         - 2' walking strip in front of cage (x = 3..5)
         - back of cage flush with back concrete pad
         - z=0 wall: 2" foam wall padding, then 1 ft gap, then cage net
       Right-side strip: z = 13.17..25 (~11.83' wide)
         - bathroom 6'-11 1/2" × 8'-8 1/2" (architect 2026-05-09) at x = 3..9.96, z = 16.29..25
         - mirror wall along z = 24.7, x = 10..40
         - med ball rack at x ~43..49, z = 22.9..24.5 (dumbbell-rack .glb + procedural med balls)
         - kettlebell rack at x = 52..60, z = 22..24.5 (.glb kettlebells on primitive base)
         - weight rack at x = 64..69.15, z = 20.95..24.4 (2-post quarter rack against z=25 wall, blue, 6.73' tall)
         - dumbbell rack at x ~71..76.6, z = 22.9..24.5 (dumbbell-rack .glb)
       Door: on front wall (x = 0), span z = 7.375..10.375 (per architect: 7'-4 1/2" from z=0 edge)
    ────────────────────────────────────────────────────────────────── */

    const PAL = {
      floor:    0x141414,
      concrete: 0xb9b6ad,
      wall:     0xf2efe8,
      ceiling:  0xe8e5dc,
      truss:    0x2a3640,
      turf:     0x3d6f8c,  // sky-blue turf
      turfStripe: 0x2a5470,  // deeper-blue mowing stripe
      mound:    0x0a0a0a,  // black mound
      moundTop: 0x141414,
      rubber:   0xfafafa,
      net:      0x0a0a0a,
      mirror:   0xc8dde8,
      mirrorFrame: 0x3a4a55,
      bathWall: 0x4a5d6b,
      wood:     0x8a6a4a,
      woodDk:   0x5a3e26,
      kbBlack:  0x1a232b,
      brand:    0xb8d4e0,
      mat:      0x3a4a55,
    };

    // ── Renderer / scene / cameras ───────────────────────────────────
    const app = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa3c4d8); // daytime sky
    scene.fog = new THREE.Fog(0xc1d4df, 140, 380);

    // Image-based lighting via a procedural indoor environment (PMREM).
    // Every MeshStandardMaterial with envMap=null auto-picks this up as
    // ambient/diffuse + reflection contribution — major realism win.
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    pmrem.dispose();

    // GLTFLoader instance for future photo-realistic equipment pieces.
    // Usage pattern (when assets land in assets/equipment/*.glb):
    //   loadEquipment('../assets/equipment/squat-rack.glb', { x: 67, y: 0, z: 16.7 });
    const gltfLoader = new GLTFLoader();
    function loadEquipment(path, { x = 0, y = 0, z = 0, rotY = 0, scale = 1 } = {}) {
      gltfLoader.load(path, (gltf) => {
        const obj = gltf.scene;
        obj.position.set(x, y, z);
        obj.rotation.y = rotY;
        obj.scale.setScalar(scale);
        obj.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(obj);
      }, undefined, (err) => {
        console.warn(`[loadEquipment] failed to load ${path}:`, err);
      });
    }

    // Building center: (40, 4, 12.5). Default orbit looks at the glass front from outside.
    const orbitCam = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 600);
    orbitCam.position.set(-35, 28, 55);
    orbitCam.lookAt(40, 4, 12.5);

    const walkCam = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 300);
    walkCam.position.set(1.5, 5.6, 15.5); // standing just inside the front door
    walkCam.lookAt(40, 5.6, 12.5);

    // ── Lighting ──────────────────────────────────────────────────────
    // Ambient kept low because scene.environment (PMREM) provides diffuse fill.
    scene.add(new THREE.AmbientLight(0xffffff, 0.15));

    const sun = new THREE.DirectionalLight(0xfff4e0, 1.0);
    sun.position.set(-40, 70, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 100;
    sun.shadow.camera.top = 80;
    sun.shadow.camera.bottom = -80;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 250;
    sun.shadow.bias = -0.0005;
    scene.add(sun);

    scene.add(new THREE.HemisphereLight(0xb8d4e0, 0x2a3640, 0.45));

    // Ceiling-mounted bay lights along the LENGTH axis
    for (let x = 8; x < 80; x += 12) {
      const bay = new THREE.PointLight(0xfff0d4, 0.55, 35, 1.5);
      bay.position.set(x, 13.5, 12.5);
      scene.add(bay);
      const housing = new THREE.Mesh(
        new THREE.BoxGeometry(1.0, 0.4, 2.5),
        new THREE.MeshStandardMaterial({ color: 0x222428, roughness: 0.6 })
      );
      housing.position.set(x, 13.6, 12.5);
      scene.add(housing);
      const bulb = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.15, 2.2),
        new THREE.MeshBasicMaterial({ color: 0xfff4d4 })
      );
      bulb.position.set(x, 13.4, 12.5);
      scene.add(bulb);
    }

    // ── Materials ─────────────────────────────────────────────────────
    const matFloor = new THREE.MeshStandardMaterial({ color: PAL.floor, roughness: 0.75, metalness: 0.05 });
    const matConcrete = new THREE.MeshStandardMaterial({ color: PAL.concrete, roughness: 0.92 });
    const matWall = new THREE.MeshStandardMaterial({ color: PAL.wall, roughness: 0.85, side: THREE.DoubleSide });
    const matCeiling = new THREE.MeshStandardMaterial({ color: PAL.ceiling, roughness: 0.9, side: THREE.DoubleSide });
    const matTurf = new THREE.MeshStandardMaterial({ color: PAL.turf, roughness: 0.95 });
    const matNet = new THREE.MeshStandardMaterial({
      color: 0x6a6a6a, roughness: 0.6, transparent: true, opacity: 0.14,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const matFrame = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.55, metalness: 0.4 });
    const matMoundTop = new THREE.MeshStandardMaterial({ color: PAL.moundTop, roughness: 0.7 });
    const matRubber = new THREE.MeshStandardMaterial({ color: PAL.rubber, roughness: 0.5 });
    const matBathWall = new THREE.MeshStandardMaterial({ color: PAL.bathWall, roughness: 0.85, side: THREE.DoubleSide });
    const matMirrorFrame = new THREE.MeshStandardMaterial({ color: PAL.mirrorFrame, roughness: 0.55, metalness: 0.5 });
    const matWood = new THREE.MeshStandardMaterial({ color: PAL.wood, roughness: 0.8 });
    const matWoodDk = new THREE.MeshStandardMaterial({ color: PAL.woodDk, roughness: 0.85 });
    const matMetal = new THREE.MeshStandardMaterial({ color: PAL.kbBlack, roughness: 0.4, metalness: 0.6 });
    const matMat = new THREE.MeshStandardMaterial({ color: PAL.mat, roughness: 0.95 });

    /* ─────────────────────────────────────────────────────────────────
       BUILDING SHELL (long axis = x)
    ────────────────────────────────────────────────────────────────── */

    // Concrete pad - front (x = 0..3)
    {
      const m = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 25), matConcrete);
      m.position.set(1.5, -0.025, 12.5);
      m.receiveShadow = true;
      scene.add(m);
    }
    // Concrete pad - back (x = 77..80)
    {
      const m = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 25), matConcrete);
      m.position.set(78.5, -0.025, 12.5);
      m.receiveShadow = true;
      scene.add(m);
    }
    // Rubber interior floor (x = 3..77)
    {
      const m = new THREE.Mesh(new THREE.BoxGeometry(74, 0.05, 25), matFloor);
      m.position.set(40, -0.025, 12.5);
      m.receiveShadow = true;
      scene.add(m);
    }

    // Walls
    const WALL_T = 0.5;
    const WALL_H = 14;
    function wall(w, h, d, x, y, z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matWall);
      m.position.set(x, y, z);
      m.castShadow = true; m.receiveShadow = true;
      return m;
    }
    // Long walls (running along x)
    scene.add(wall(80 + WALL_T*2, WALL_H, WALL_T, 40, WALL_H/2, -WALL_T/2));      // left long wall (z=0)
    scene.add(wall(80 + WALL_T*2, WALL_H, WALL_T, 40, WALL_H/2, 25 + WALL_T/2));  // right long wall (z=25)
    // Bay door state — outer scope so the click handler + animate loop can reach it
    let bayDoorGroup, bayDoorRollH;
    let bayDoorOpen = false;
    let bayDoorState = 1; // 1 = fully closed, 0 = fully open (lerps toward target)

    // Back short wall (x=80) — with garage roll-up + pedestrian back door
    {
      // Garage roll-up door (centered on the back wall, 2026-05-09)
      const ROLL_W = 10, ROLL_H = 8;
      const ROLL_Z1 = 7.5, ROLL_Z2 = ROLL_Z1 + ROLL_W;  // z=7.5..17.5 (centered)

      // Pedestrian back door (shifted proportionally with the bay door)
      const PED_W = 3, PED_H = 7;
      const PED_Z1 = 20.5, PED_Z2 = PED_Z1 + PED_W;     // z=20.5..23.5

      // Wall segments around the two openings
      // z=0..ROLL_Z1: left of garage
      scene.add(wall(WALL_T, WALL_H, ROLL_Z1, 80 + WALL_T/2, WALL_H/2, ROLL_Z1/2));
      // z=ROLL_Z2..PED_Z1: between garage and pedestrian
      scene.add(wall(WALL_T, WALL_H, PED_Z1 - ROLL_Z2, 80 + WALL_T/2, WALL_H/2, (ROLL_Z2 + PED_Z1)/2));
      // z=PED_Z2..25: right of pedestrian
      scene.add(wall(WALL_T, WALL_H, 25 - PED_Z2, 80 + WALL_T/2, WALL_H/2, (PED_Z2 + 25)/2));

      // Lintel above garage (y = 8..14)
      scene.add(wall(WALL_T, WALL_H - ROLL_H, ROLL_W, 80 + WALL_T/2, ROLL_H + (WALL_H - ROLL_H)/2, (ROLL_Z1 + ROLL_Z2)/2));
      // Lintel above pedestrian door (y = 7..14)
      scene.add(wall(WALL_T, WALL_H - PED_H, PED_W, 80 + WALL_T/2, PED_H + (WALL_H - PED_H)/2, (PED_Z1 + PED_Z2)/2));

      // Bay door is wrapped in a Group so it can animate (roll up) as a unit.
      // Group origin = world (80, ROLL_H/2, garage_center_z); children positions
      // are relative to that origin so scaling the group along y compresses the
      // door panel toward the top of the opening (lintel).
      bayDoorGroup = new THREE.Group();
      bayDoorGroup.position.set(80, ROLL_H/2, (ROLL_Z1 + ROLL_Z2)/2);
      scene.add(bayDoorGroup);

      // roller door slab (sectional panel)
      const doorMat = new THREE.MeshStandardMaterial({ color: 0x3a4a55, roughness: 0.55, metalness: 0.3 });
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.15, ROLL_H, ROLL_W), doorMat);
      door.position.set(0, 0, 0); // centered in group
      door.castShadow = true;
      bayDoorGroup.add(door);

      // section grooves (every 2 ft of height) — relative to group center
      const grooveMat = new THREE.MeshStandardMaterial({ color: 0x1a232b, roughness: 0.8 });
      for (let yy = 2; yy < ROLL_H; yy += 2) {
        const groove = new THREE.Mesh(
          new THREE.BoxGeometry(0.18, 0.05, ROLL_W),
          grooveMat
        );
        groove.position.set(0, yy - ROLL_H/2, 0);
        bayDoorGroup.add(groove);
      }

      // vertical handle / lift bar (interior side) — relative to group
      const handleMat = new THREE.MeshStandardMaterial({ color: 0xb8d4e0, roughness: 0.4, metalness: 0.6 });
      const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.2, 0.15), handleMat);
      handle.position.set(-0.15, 3.5 - ROLL_H/2, 0);
      bayDoorGroup.add(handle);

      // expose ROLL_H so the animate loop can compute open/closed positions
      bayDoorRollH = ROLL_H;

      // door tracks — vertical rails inside, on each side of the opening, up past the lintel
      const trackMat = new THREE.MeshStandardMaterial({ color: 0x3a4a55, roughness: 0.5, metalness: 0.6 });
      const trackGeom = new THREE.BoxGeometry(0.4, ROLL_H + 0.5, 0.18);
      const trackL = new THREE.Mesh(trackGeom, trackMat);
      trackL.position.set(79.7, (ROLL_H + 0.5)/2, ROLL_Z1);
      const trackR = trackL.clone();
      trackR.position.set(79.7, (ROLL_H + 0.5)/2, ROLL_Z2);
      scene.add(trackL, trackR);

      // roller drum (horizontal cylinder above the door, mounted to the lintel)
      const drum = new THREE.Mesh(
        new THREE.CylinderGeometry(0.45, 0.45, ROLL_W + 0.4, 16),
        trackMat
      );
      drum.rotation.x = Math.PI / 2;
      drum.position.set(79.6, ROLL_H + 0.7, (ROLL_Z1 + ROLL_Z2)/2);
      scene.add(drum);

      // drum end caps / mounting plates
      const capGeom = new THREE.BoxGeometry(0.5, 1.0, 0.2);
      const capL = new THREE.Mesh(capGeom, trackMat);
      capL.position.set(79.6, ROLL_H + 0.7, ROLL_Z1 - 0.2);
      const capR = capL.clone();
      capR.position.set(79.6, ROLL_H + 0.7, ROLL_Z2 + 0.2);
      scene.add(capL, capR);

      // Pedestrian back door — simple slab
      const pedDoor = new THREE.Mesh(new THREE.BoxGeometry(0.15, PED_H, PED_W), doorMat);
      pedDoor.position.set(80, PED_H/2, (PED_Z1 + PED_Z2)/2);
      pedDoor.castShadow = true;
      scene.add(pedDoor);

      // Pedestrian door knob/handle (interior side)
      const pedHandle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.4, 0.15), handleMat);
      pedHandle.position.set(79.85, 3.3, PED_Z2 - 0.4);
      scene.add(pedHandle);
    }
    // Front facade (x=0) — full glass curtain wall + glass door
    {
      const matGlass = new THREE.MeshStandardMaterial({
        color: 0xb8d4e0,
        metalness: 0.3,
        roughness: 0.05,
        transparent: true,
        opacity: 0.22,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const matMullion = new THREE.MeshStandardMaterial({
        color: 0x2a3640, metalness: 0.6, roughness: 0.4,
      });

      // Glass panes (3 sections: left of door, transom over door, right of door)
      function pane(zCenter, w, yCenter, h) {
        const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), matGlass);
        m.position.set(0, yCenter, zCenter);
        m.rotation.y = -Math.PI / 2; // face -x (toward parking lot)
        return m;
      }
      scene.add(pane(3.6875, 7.375, 7,    14)); // left pane (z=0..7.375)
      scene.add(pane(8.875,  3,     10.5,  7)); // transom over door (z=7.375..10.375, y=7..14)
      scene.add(pane(17.6875, 14.625, 7,   14)); // right pane (z=10.375..25)

      // Vertical mullions every ~5 ft + at door jambs (jambs at 7.375 and 10.375 per architect spec)
      const vMullionGeom = new THREE.BoxGeometry(0.5, 14, 0.25);
      [0, 5, 7.375, 10.375, 15, 20, 25].forEach(z => {
        const m = new THREE.Mesh(vMullionGeom, matMullion);
        m.position.set(0, 7, z);
        scene.add(m);
      });
      // Horizontal rails at floor, mid (door head height), and ceiling
      const hRail = (y) => {

      // Glass door (hinged on z=7.375 side, swung inward to interior)
      const doorPivot = new THREE.Group();

      const dTop = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.35, 3), doorRailMat);
      dTop.position.set(0, 6.83, 1.5);

      dStileR.position.set(0, 3.5, 2.9);

      const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.5, 0.15), handleMat);

    // Roof trusses (perpendicular to length, every 8 ft along x)
    for (let x = 4; x <= 80; x += 8) {

    /* ─────────────────────────────────────────────────────────────────
       BRAND TEXTURES
    ────────────────────────────────────────────────────────────────── */
    // Full horizontal lockup: TAP diamond + ATHLETES / PITCHING ACADEMY
    function makeLockupTexture() {
      const c = document.createElement('canvas');
      c.width = 1280; c.height = 400;
      const ctx = c.getContext('2d');
      // light-blue brand panel
      ctx.fillStyle = '#b8d4e0';
      ctx.fillRect(0, 0, 1280, 400);

      const ink = '#1a232b';
      ctx.strokeStyle = ink;
      ctx.fillStyle = ink;

      // Diamond (left)
      ctx.lineWidth = 16;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(220,  50);
      ctx.lineTo(390, 200);
      ctx.lineTo(220, 350);
      ctx.lineTo( 50, 200);
      ctx.closePath();
      ctx.stroke();

      // TAP text inside diamond
      ctx.font = '900 115px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('TAP', 220, 195);

      // Home plate at bottom of diamond
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(186, 268);
      ctx.lineTo(254, 268);
      ctx.lineTo(254, 296);
      ctx.lineTo(220, 326);
      ctx.lineTo(186, 296);
      ctx.closePath();
      ctx.stroke();

      // "ATHLETES" — big bold (right)
      ctx.font = '900 138px Inter, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('ATHLETES', 470, 155);

      // "PITCHING ACADEMY" — smaller, letter-spaced
      ctx.font = '500 56px Inter, sans-serif';
      const sub = 'PITCHING ACADEMY';
      const startX = 470;
      const subY = 252;
      const spacing = 8;
      let xx = startX;
      for (const ch of sub) {
        ctx.fillText(ch, xx, subY);
        xx += ctx.measureText(ch).width + spacing;
      }

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    // Circle floor decal — TAP diamond + home plate inside a ring on a brand panel
    function makeCircleLogoTexture() {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');
      const cx = 256, cy = 256;

      // light-blue filled circle (the "painted" decal panel)
      ctx.fillStyle = '#b8d4e0';
      ctx.beginPath();
      ctx.arc(cx, cy, 244, 0, Math.PI * 2);
      ctx.fill();

      const ink = '#1a232b';
      ctx.strokeStyle = ink;
      ctx.fillStyle = ink;

      // outer ring
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(cx, cy, 220, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, 196, 0, Math.PI * 2);
      ctx.stroke();

      // diamond
      ctx.lineWidth = 14;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 130);
      ctx.lineTo(cx + 130, cy);
      ctx.lineTo(cx, cy + 130);
      ctx.lineTo(cx - 130, cy);
      ctx.closePath();
      ctx.stroke();

      // TAP text
      ctx.font = '900 76px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('TAP', cx, cy - 4);

      // home plate inside the diamond, below TAP
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(cx - 28, cy + 56);
      ctx.lineTo(cx + 28, cy + 56);
      ctx.lineTo(cx + 28, cy + 80);
      ctx.lineTo(cx,      cy + 104);
      ctx.lineTo(cx - 28, cy + 80);
      ctx.closePath();
      ctx.stroke();

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    // Motivational quote on the back wall (replaces the TAP lockup that used to live here).
    // Auto-fits the quote font size to keep the text within the canvas, then
    // scales the attribution proportionally.
    function makeQuoteTexture() {
      const c = document.createElement('canvas');
      c.width = 1536; c.height = 384;
      const ctx = c.getContext('2d');

      const quote = '"IT TAKES WHAT IT TAKES"';
      const attr  = '— NICK SABAN';

      // Auto-fit quote to ~85% of canvas width
      let quoteSize = 120;
      ctx.font = `900 ${quoteSize}px Inter, sans-serif`;
      const target = c.width * 0.85;
      while (ctx.measureText(quote).width > target && quoteSize > 40) {
        quoteSize -= 4;
        ctx.font = `900 ${quoteSize}px Inter, sans-serif`;
      }

      // Quote
      ctx.fillStyle = 'rgba(184,212,224,0.96)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(quote, c.width / 2, 150);

      // Attribution — proportional to quote size
      ctx.fillStyle = 'rgba(184,212,224,0.65)';
      ctx.font = `500 ${Math.floor(quoteSize * 0.45)}px Inter, sans-serif`;
      ctx.fillText(attr, c.width / 2, 270);

      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    // shared lockup texture (used by all wall placements except back wall)
    const lockupTex = makeLockupTexture();

    // Back wall — motivational quote (was TAP lockup).
    // Positioned in the lintel above the centered garage door (garage z=7.5..17.5,
    // lintel y=8..14). z=12.5 centers it on the bay door.
    {
      const decal = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 2.5),
        new THREE.MeshBasicMaterial({ map: makeQuoteTexture(), transparent: true })
      );
      decal.position.set(79.95, 10.5, 12.5); // y=10.5 in lintel (8..14), z=12.5 centered on garage
      decal.rotation.y = -Math.PI / 2;
      scene.add(decal);
    }

    // Left wall decals — 3 lockups along the cage length (z=0 wall, behind the left side net)
    [20, 45, 70].forEach(xPos => {
      const decal = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 3.75),
        new THREE.MeshBasicMaterial({ map: lockupTex, transparent: true })
      );
      decal.position.set(xPos, 7.5, 0.01); // z=0 interior face, default normal faces +z (into building)
      scene.add(decal);
    });

    // Floor circle decal on rubber flooring (mobility/right-strip area)
    {
      const tex = makeCircleLogoTexture();
      const floorLogo = new THREE.Mesh(
        new THREE.PlaneGeometry(8, 8),
        new THREE.MeshBasicMaterial({ map: tex, transparent: true })
      );
      floorLogo.rotation.x = -Math.PI / 2;
      floorLogo.position.set(25, 0.06, 19);
      scene.add(floorLogo);
    }

    /* ─────────────────────────────────────────────────────────────────
       PITCHING CAGE — 12' × 72' × 11' (x=5..77, z=1.17..13.17, h=11)
       Cage net offset from z=0 wall by 2" pad thickness + 1 ft buffer.
    ────────────────────────────────────────────────────────────────── */

    const cageX1 = 5, cageX2 = 77;
    const PAD_THK = 2/12, PAD_GAP = 1;
    const cageZ1 = PAD_THK + PAD_GAP;     // ~1.17
    const cageZ2 = cageZ1 + 12;           // ~13.17 (12 ft cage width)
    const cageH = 11;

    // Turf base
    {
      const m = new THREE.Mesh(new THREE.BoxGeometry(cageX2-cageX1, 0.06, cageZ2-cageZ1), matTurf);
      m.position.set((cageX1+cageX2)/2, 0.03, (cageZ1+cageZ2)/2);
      m.receiveShadow = true;
      scene.add(m);
    }
    /* Distance markers across the turf — perpendicular to the lane direction.
       Distance is measured from the BACK POINT of home plate (world x ≈ 68.15)
       backward to where the FRONT EDGE OF THE PITCHING RUBBER would sit.
       Plate moved from x=73 → x=69 on 2026-05-09, so back point: 73-0.85=72.15
       became 69-0.85=68.15. */
    {
      const platePointX = 68.15;
      const distances = [
        { ft: 40,   label: "40'"    },
        { ft: 46,   label: "46'"    },
        { ft: 50,   label: "50'"    },
        { ft: 54,   label: "54'"    },
        { ft: 60.5, label: "60'6\"" },
      ];
      const lineMat = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.6 });

      function makeDistanceLabel(text) {
        const c = document.createElement('canvas');
        c.width = 384; c.height = 128;
        const ctx = c.getContext('2d');
        ctx.fillStyle = 'rgba(255,255,255,0.94)';
        ctx.font = '900 90px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, c.width / 2, c.height / 2);
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = 8;
        return tex;
      }

      distances.forEach(d => {
        const x = platePointX - d.ft;
        // painted line across the full cage width
        const line = new THREE.Mesh(
          new THREE.BoxGeometry(0.15, 0.005, cageZ2 - cageZ1),
          lineMat
        );
        line.position.set(x, 0.064, (cageZ1 + cageZ2) / 2);
        scene.add(line);

        // labels — one in each lane, painted on the turf so a pitcher reads them
        // correctly when looking +x toward home plate
        [5, 11].forEach(zCenter => {
          const labelMat = new THREE.MeshBasicMaterial({
            map: makeDistanceLabel(d.label),
            transparent: true,
          });
          const label = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.6), labelMat);
          label.rotation.x = -Math.PI / 2;
          label.position.set(x - 0.9, 0.066, zCenter);
          scene.add(label);
        });
      });
    }

    // Net cage frame: vertical posts every 9 ft along x (8 posts each side spans 72 ft)
    const FRAME_T = 0.2;
    for (let x = cageX1; x <= cageX2 + 0.001; x += 9) {
      [cageZ1, cageZ2].forEach(z => {
        const post = new THREE.Mesh(
          new THREE.BoxGeometry(FRAME_T, cageH, FRAME_T),
          matFrame
        );
        post.position.set(x, cageH/2, z);
        scene.add(post);
      });
    }

    // Top rails (4 sides)
    function rail(p1, p2) {
      const dir = new THREE.Vector3().subVectors(p2, p1);
      const len = dir.length();
      const m = new THREE.Mesh(new THREE.BoxGeometry(FRAME_T, FRAME_T, len), matFrame);
      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      m.position.copy(mid);
      m.lookAt(p2);
      return m;
    }
    scene.add(rail(new THREE.Vector3(cageX1, cageH, cageZ1), new THREE.Vector3(cageX2, cageH, cageZ1)));
    scene.add(rail(new THREE.Vector3(cageX1, cageH, cageZ2), new THREE.Vector3(cageX2, cageH, cageZ2)));
    scene.add(rail(new THREE.Vector3(cageX1, cageH, cageZ1), new THREE.Vector3(cageX1, cageH, cageZ2)));
    scene.add(rail(new THREE.Vector3(cageX2, cageH, cageZ1), new THREE.Vector3(cageX2, cageH, cageZ2)));

    // Net panels
    function netPanel(w, h, d, x, y, z) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matNet);
      m.position.set(x, y, z);
      return m;
    }
    // Left side (z=cageZ1): cage net at the wall-side boundary.
    scene.add(netPanel(cageX2-cageX1, cageH, 0.05, (cageX1+cageX2)/2, cageH/2, cageZ1));
    // Foam wall padding (matsupplier-style, 2" thick, 6 ft tall) flush with
    // z=0 building wall. 1 ft gap between padding face and the cage net.
    {
      const padH = 6;
      const padMat = new THREE.MeshStandardMaterial({
        color: 0x2a3a47, roughness: 0.85, metalness: 0.05,
      });
      const pad = new THREE.Mesh(
        new THREE.BoxGeometry(cageX2-cageX1, padH, PAD_THK),
        padMat
      );
      pad.position.set(
        (cageX1+cageX2)/2,    // centered along cage length
        padH/2,                // bottom flush with floor
        PAD_THK/2              // sits flush with z=0 wall, sticking 2" inward
      );
      scene.add(pad);
    }
    // Right (z=cageZ2)
    scene.add(netPanel(cageX2-cageX1, cageH, 0.05, (cageX1+cageX2)/2, cageH/2, cageZ2));
    // Front net (x=cageX1): runs along z, thin in x
    scene.add(netPanel(0.05, cageH, cageZ2-cageZ1, cageX1, cageH/2, (cageZ1+cageZ2)/2));
    // Back net (x=cageX2)
    scene.add(netPanel(0.05, cageH, cageZ2-cageZ1, cageX2, cageH/2, (cageZ1+cageZ2)/2));
    // Top net
    scene.add(netPanel(cageX2-cageX1, 0.05, cageZ2-cageZ1, (cageX1+cageX2)/2, cageH, (cageZ1+cageZ2)/2));

    /* ─────────────────────────────────────────────────────────────────
       MOUNDS — at front of cage
       Each 9' × 4' × 10" tall. Long axis along x (toward back of cage).
       Mound A: x=7..16, z=cageZ1+1..cageZ1+5  (~2.17..6.17)
       Mound B: x=7..16, z=cageZ2-6..cageZ2-2  (~7.17..11.17) — 1ft gap from Mound A
    ────────────────────────────────────────────────────────────────── */
    // Portable mound spec 2026-05-09: 9' × 4' × 10" tall.
    function mound(x1, x2, z1, z2) {
      const w = x2 - x1, d = z2 - z1, h = 10/12; // 10 inches
      const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matMoundTop);
      body.position.set((x1+x2)/2, h/2, (z1+z2)/2);
      body.castShadow = true;
      scene.add(body);
      // Pitching rubber on top, ~1.5 ft from the back. Pitcher strides forward (+x).
      const rubber = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 2), matRubber);
      rubber.position.set(x1 + 1.5, h + 0.04, (z1+z2)/2);
      scene.add(rubber);
    }
    mound(7, 16, cageZ1+1, cageZ1+5);   // Mound A — 9' × 4', 1ft margin from wall-side net
    mound(7, 16, cageZ2-6, cageZ2-2);   // Mound B — 9' × 4', 1ft gap to Mound A, 2ft margin from gym-side net

    /* ─────────────────────────────────────────────────────────────────
       HOME PLATES — one per mound, each at x=69 lined up with its mound.
       Plate moved from x=73 to x=69 (2026-05-09) to give an 8 ft catcher's
       box behind the plate (x=69 to back net at x=77). This also lands
       rubber-to-plate at regulation 60'-6" (rubber x=8.5 → plate x=69).
         Plate A at z=cageZ1+3  (lined up with Mound A, z=cageZ1+1..cageZ1+5)
         Plate B at z=cageZ2-4  (lined up with Mound B, z=cageZ2-6..cageZ2-2)
       Pentagon shape, point facing -x (toward the pitcher).
    ────────────────────────────────────────────────────────────────── */
    {
      // Reusable pentagon geometry for home plate
      const shape = new THREE.Shape();
      shape.moveTo(0, -0.71); shape.lineTo(0, 0.71);
      shape.lineTo(-0.4, 0.71); shape.lineTo(-0.85, 0); shape.lineTo(-0.4, -0.71);
      shape.closePath();
      const plateGeom = new THREE.ExtrudeGeometry(shape, { depth: 0.06, bevelEnabled: false });
      const plateMat = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.4 });

      // Catcher-target texture: dark teal background, dark catcher silhouette,
      // 8 tan/orange mitts arranged around the strike zone with numbered
      // positions (1 = center, 2/3 = sides, 4/5 = upper corners, 6/7 = low
      // corners, 8 = high middle). Used as the back-net pitching target.
      function makeCatcherTargetTexture() {
        const c = document.createElement('canvas');
        c.width = 1024; c.height = 1024;
        const ctx = c.getContext('2d');

        // Dark teal/slate background
        ctx.fillStyle = '#1a2f3a';
        ctx.fillRect(0, 0, c.width, c.height);

        // Catcher body silhouette — chest protector
        ctx.fillStyle = '#2a3540';
        const bodyX = 400, bodyY = 380, bodyW = 224, bodyH = 360, bodyR = 50;
        ctx.beginPath();
        ctx.moveTo(bodyX + bodyR, bodyY);
        ctx.lineTo(bodyX + bodyW - bodyR, bodyY);
        ctx.quadraticCurveTo(bodyX + bodyW, bodyY, bodyX + bodyW, bodyY + bodyR);
        ctx.lineTo(bodyX + bodyW, bodyY + bodyH - bodyR);
        ctx.quadraticCurveTo(bodyX + bodyW, bodyY + bodyH, bodyX + bodyW - bodyR, bodyY + bodyH);
        ctx.lineTo(bodyX + bodyR, bodyY + bodyH);
        ctx.quadraticCurveTo(bodyX, bodyY + bodyH, bodyX, bodyY + bodyH - bodyR);
        ctx.lineTo(bodyX, bodyY + bodyR);
        ctx.quadraticCurveTo(bodyX, bodyY, bodyX + bodyR, bodyY);
        ctx.closePath();
        ctx.fill();

        // Catcher mask/head
        ctx.beginPath();
        ctx.arc(512, 330, 78, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3a4a55';
        ctx.fillRect(454, 305, 116, 50);

        // 8 catcher mitts/gloves
        const mitts = [
          { x: 512, y: 580, num: '1' }, // center
          { x: 360, y: 580, num: '2' }, // left
          { x: 664, y: 580, num: '3' }, // right
          { x: 290, y: 420, num: '4' }, // upper left
          { x: 734, y: 420, num: '5' }, // upper right
          { x: 280, y: 760, num: '6' }, // lower left
          { x: 744, y: 760, num: '7' }, // lower right
          { x: 512, y: 200, num: '8' }, // top center
        ];

        mitts.forEach(m => {
          // dark stitched edge
          ctx.fillStyle = '#15171a';
          ctx.beginPath();
          ctx.ellipse(m.x, m.y, 95, 68, 0, 0, Math.PI * 2);
          ctx.fill();
          // tan glove face
          ctx.fillStyle = '#d4825a';
          ctx.beginPath();
          ctx.ellipse(m.x, m.y, 85, 58, 0, 0, Math.PI * 2);
          ctx.fill();
          // number
          ctx.fillStyle = '#15171a';
          ctx.font = '900 60px Inter, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(m.num, m.x, m.y + 4);
        });

        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = 8;
        return tex;
      }

      const tgtMat = new THREE.MeshBasicMaterial({
        map: makeCatcherTargetTexture(), side: THREE.DoubleSide,
      });

      [cageZ1+3, cageZ2-4].forEach(z => {
        // home plate
        const plate = new THREE.Mesh(plateGeom, plateMat);
        plate.rotation.x = -Math.PI / 2;
        plate.position.set(69, 0.07, z);
        scene.add(plate);

        // Catcher target on back net (x=77), centered above the plate
        const tgt = new THREE.Mesh(new THREE.PlaneGeometry(4, 4), tgtMat);
        tgt.position.set(76.95, 3.7, z);
        tgt.rotation.y = -Math.PI / 2;
        scene.add(tgt);
      });
    }

    /* ─────────────────────────────────────────────────────────────────
       BATHROOM (x=3..8, z=20..25, h=9) — front-right interior corner
       Right wall (z=25) shared with building wall. Door on z=20 face.
    ────────────────────────────────────────────────────────────────── */
    {
      // Bathroom interior per architect spec 2026-05-09: 8'-8 1/2" × 6'-11 1/2".
      // Long side (8'-8.5") runs along z; short side (6'-11.5") along x to clear mirror at x=10.
      // Door is on the LONG wall at x=bx2 (gym-facing, mirror side). 1×1 ft floor grate
      // sits to the right of the door (-z side) in the gym floor — code-required, can't be covered.
      const bx1 = 3, bx2 = bx1 + 6 + 11.5/12;
      const bz2 = 25, bz1 = bz2 - (8 + 8.5/12);
      const bh = 9;
      // entry-side wall (x=bx1), faces -x toward entry pad
      scene.add(mkBath(0.2, bh, bz2-bz1, bx1, bh/2, (bz1+bz2)/2));
      // gym-facing wall (x=bx2) — has the door
      scene.add(mkBath(0.2, bh, bz2-bz1, bx2, bh/2, (bz1+bz2)/2));
      // side wall (z=bz1), perpendicular to mirror — solid
      scene.add(mkBath(bx2-bx1, bh, 0.2, (bx1+bx2)/2, bh/2, bz1));
      // roof
      scene.add(mkBath(bx2-bx1, 0.2, bz2-bz1, (bx1+bx2)/2, bh, (bz1+bz2)/2));

      function mkBath(w, h, d, x, y, z) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matBathWall);
        m.position.set(x, y, z);
        return m;
      }

      // Door on x=bx2 wall (gym-facing), centered along z. 3 ft wide, opens into bathroom.
      const doorWidth = 3;
      const doorCenterZ = (bz1+bz2)/2;
      const door = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 7, doorWidth),
        new THREE.MeshStandardMaterial({ color: 0x1a232b, roughness: 0.5 })
      );
      door.position.set(bx2 + 0.1, 3.5, doorCenterZ);
      scene.add(door);
      // handle (toward +z side of door)
      const handle = new THREE.Mesh(
        new THREE.SphereGeometry(0.1),
        new THREE.MeshStandardMaterial({ color: PAL.brand, roughness: 0.3, metalness: 0.6 })
      );
      handle.position.set(bx2 + 0.16, 3.3, doorCenterZ + 1.2);
      scene.add(handle);

      // WC sign above the door, facing the gym (+x)
      {
        const c = document.createElement('canvas');
        c.width = 256; c.height = 128;
        const ctx = c.getContext('2d');
        ctx.fillStyle = 'rgba(184,212,224,0.95)';
        ctx.font = '800 80px Inter, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('WC', 128, 64);
        const tex = new THREE.CanvasTexture(c);
        tex.colorSpace = THREE.SRGBColorSpace;
        const sign = new THREE.Mesh(
          new THREE.PlaneGeometry(1.5, 0.75),
          new THREE.MeshBasicMaterial({ map: tex, transparent: true })
        );
        sign.rotation.y = -Math.PI / 2; // face +x toward gym
        sign.position.set(bx2 + 0.15, 6, doorCenterZ);
        scene.add(sign);
      }

      // Floor grate (1×1 ft, code-required) — gym floor, tucked into the corner
      // where the bathroom's gym-facing wall meets the side wall at z=bz1
      // (right edge when looking at the bathroom from the gym).
      {
        const grateW = 1, grateD = 1, grateThk = 0.05;
        const grateMat = new THREE.MeshStandardMaterial({
          color: 0x2a2724, roughness: 0.85, metalness: 0.4
        });
        const grate = new THREE.Mesh(
          new THREE.BoxGeometry(grateW, grateThk, grateD),
          grateMat
        );
        grate.position.set(
          bx2 + 0.1 + grateW/2,    // just outside the gym-facing wall
          grateThk/2,              // sitting on the floor
          bz1 + grateD/2           // flush with the side wall at z=bz1
        );
        scene.add(grate);
      }
    }

    /* ─────────────────────────────────────────────────────────────────
       MIRROR WALL — on right wall (z=25), x=10..40, h=10
    ────────────────────────────────────────────────────────────────── */
    {
      // Real-time reflective mirror — renders the scene from a mirrored camera
      // each frame and projects it onto the surface. Reflects the gym in front.
      // textureWidth/Height match the viewport for a sharp, undimmed reflection.
      const mirror = new Reflector(new THREE.PlaneGeometry(30, 10), {
        clipBias: 0.003,
        textureWidth:  Math.round(window.innerWidth  * window.devicePixelRatio),
        textureHeight: Math.round(window.innerHeight * window.devicePixelRatio),
        color: 0xffffff, // no tint — let the reflected scene's own colors come through
      });
      mirror.position.set(25, 5, 24.5); // slightly forward of the wall so the reflection plane sits clearly in the gym
      mirror.rotation.y = Math.PI;      // face -z (into the building)
      scene.add(mirror);

      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(30.4, 10.4, 0.15),
        matMirrorFrame
      );
      frame.position.set(25, 5, 24.92);
      scene.add(frame);

      // floor tape line in front of mirror (z=23, x=10..40)
      const tape = new THREE.Mesh(
        new THREE.BoxGeometry(30, 0.005, 0.1),
        new THREE.MeshStandardMaterial({ color: PAL.brand, emissive: PAL.brand, emissiveIntensity: 0.3 })
      );
      tape.position.set(25, 0.07, 23);
      scene.add(tape);

    }

    /* ─────────────────────────────────────────────────────────────────
       KETTLEBELL RACK (x=52..60, z=22..24.5)
    ────────────────────────────────────────────────────────────────── */
    {
      const kx1 = 52, kx2 = 60, kz1 = 22, kz2 = 24.5;
      const base = new THREE.Mesh(
        new THREE.BoxGeometry(kx2-kx1, 0.6, kz2-kz1),
        matWoodDk
      );
      base.position.set((kx1+kx2)/2, 0.3, (kz1+kz2)/2);
      base.castShadow = true;
      scene.add(base);
      const uprightGeom = new THREE.BoxGeometry(0.15, 3, 0.15);
      [[kx1,kz1],[kx2,kz1],[kx1,kz2],[kx2,kz2]].forEach(([x,z]) => {
        const u = new THREE.Mesh(uprightGeom, matMetal);
        u.position.set(x, 1.5 + 0.6, z);
        scene.add(u);
      });
      // Photo-realistic kettlebells via CC0 .glb (plaggy, 1K PBR textures).
      // Load once, clone 5 times scaled to match the existing size progression.
      const kbSizes = [0.35, 0.42, 0.50, 0.58, 0.66];
      gltfLoader.load('../assets/equipment/kettlebell.glb', (gltf) => {
        const proto = gltf.scene;
        const bbox  = new THREE.Box3().setFromObject(proto);
        const size  = new THREE.Vector3(); bbox.getSize(size);
        const protoHeight = size.y || 1;

        kbSizes.forEach((r, i) => {
          const obj = proto.clone(true);
          const targetHeight = r * 1.7;            // matches the old kettlebell vertical footprint
          const s = targetHeight / protoHeight;
          obj.scale.setScalar(s);

          const x = kx1 + 0.8 + (i / (kbSizes.length - 1)) * (kx2 - kx1 - 1.6);
          const baseOffset = -bbox.min.y * s;      // raise so the model's bottom sits on the rack base
          obj.position.set(x, 0.6 + baseOffset, (kz1+kz2)/2);

          obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
          scene.add(obj);
        });
      }, undefined, (err) => {
        console.warn('[kettlebell.glb] failed to load, falling back to primitive spheres:', err);
        // Primitive fallback so the rack isn't empty if the file 404s
        kbSizes.forEach((r, i) => {
          const x = kx1 + 0.8 + (i / (kbSizes.length - 1)) * (kx2 - kx1 - 1.6);
          const ball = new THREE.Mesh(new THREE.SphereGeometry(r, 24, 16), matMetal);
          ball.position.set(x, 0.6 + r + 0.05, (kz1+kz2)/2);
          ball.castShadow = true;
          scene.add(ball);
        });
      });
    }

    /* ─────────────────────────────────────────────────────────────────
       WEIGHT RACK / 2-POST QUARTER RACK — against the mirror-side wall
       Spec 2026-05-09: 41.34" × 61.81" × 80.71"  (3.45 × 5.15 × 6.73 ft)
       Posts span x=64..69.15 (5.15' apart) at z=24.4 (against z=25 wall).
       Stabilizer feet extend forward to z=20.95 (3.45' deep footprint).
       Metal is blue so the rack reads against the dark turf.
    ────────────────────────────────────────────────────────────────── */
    {
      const wrx1 = 64, wrx2 = wrx1 + 5.15;     // post separation along x
      const wrzBack = 24.4;                      // post z (against the wall)
      const wrzFront = wrzBack - 3.45;           // forward edge of base feet
      const wrh  = 6.73;
      const postT = 0.28;

      // Blue rack metal (visible against the dark turf)
      const rackMat = new THREE.MeshStandardMaterial({
        color: 0x2563eb, roughness: 0.45, metalness: 0.65,
      });
      const accentMat = new THREE.MeshStandardMaterial({
        color: 0xc23a2e, roughness: 0.5, metalness: 0.4,
      });
      const barMat = new THREE.MeshStandardMaterial({
        color: 0x8a8a8a, roughness: 0.35, metalness: 0.75,
      });

      // 2 vertical posts at the wall side
      const postGeom = new THREE.BoxGeometry(postT, wrh, postT);
      [wrx1, wrx2].forEach(x => {
        const post = new THREE.Mesh(postGeom, rackMat);
        post.position.set(x, wrh / 2, wrzBack);
        post.castShadow = true;
        scene.add(post);
      });

      // Top stabilizer cross-bar between the 2 posts
      const topGeom = new THREE.BoxGeometry(wrx2 - wrx1, postT, postT);
      const topBar = new THREE.Mesh(topGeom, rackMat);
      topBar.position.set((wrx1 + wrx2) / 2, wrh - postT / 2, wrzBack);
      scene.add(topBar);

      // Stabilizer feet — flat horizontal base extending forward from each post
      const footGeom = new THREE.BoxGeometry(postT, 0.18, wrzBack - wrzFront);
      [wrx1, wrx2].forEach(x => {
        const foot = new THREE.Mesh(footGeom, rackMat);
        foot.position.set(x, 0.09, (wrzBack + wrzFront) / 2);
        foot.castShadow = true;
        scene.add(foot);
      });

      // Cross-tie connecting the front of the two feet (visual stability)
      const tieGeom = new THREE.BoxGeometry(wrx2 - wrx1, 0.18, postT);
      const tie = new THREE.Mesh(tieGeom, rackMat);
      tie.position.set((wrx1 + wrx2) / 2, 0.09, wrzFront + postT / 2);
      scene.add(tie);

      // J-hooks at chest height (~y=4.2), sticking forward (-z) off the posts
      const hookY = 4.2;
      const hookDepth = 0.4;
      const hookGeom = new THREE.BoxGeometry(0.45, 0.28, hookDepth);
      [wrx1, wrx2].forEach(x => {
        const hook = new THREE.Mesh(hookGeom, accentMat);
        hook.position.set(x, hookY, wrzBack - hookDepth / 2 - postT / 2);
        scene.add(hook);
      });

      // Safety arms at squat depth (~y=2.8), shorter than j-hooks
      const safetyY = 2.8;
      const safetyDepth = 0.32;
      const safetyGeom = new THREE.BoxGeometry(0.38, 0.18, safetyDepth);
      [wrx1, wrx2].forEach(x => {
        const safety = new THREE.Mesh(safetyGeom, accentMat);
        safety.position.set(x, safetyY, wrzBack - safetyDepth / 2 - postT / 2);
        scene.add(safety);
      });

      // Olympic bar resting on j-hooks (7 ft, ~1 ft overhang each side)
      const barLen = 7;
      const barZ = wrzBack - hookDepth - postT / 2;
      const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, barLen, 12), barMat);
      bar.rotation.z = Math.PI / 2;
      bar.position.set((wrx1 + wrx2) / 2, hookY + 0.08, barZ);
      bar.castShadow = true;
      scene.add(bar);

      // Plates loaded near each end (just outside the posts)
      const plateMat = new THREE.MeshStandardMaterial({ color: 0xc23a2e, roughness: 0.5 });
      const plateGeom = new THREE.CylinderGeometry(0.55, 0.55, 0.18, 18);
      const halfRack = (wrx2 - wrx1) / 2;
      for (const dx of [-halfRack - 0.25, halfRack + 0.25]) {
        const plate = new THREE.Mesh(plateGeom, plateMat);
        plate.rotation.z = Math.PI / 2;
        plate.position.set((wrx1 + wrx2) / 2 + dx, hookY + 0.08, barZ);
        plate.castShadow = true;
        scene.add(plate);
      }
    }

    /* ─────────────────────────────────────────────────────────────────
       DUMBBELL RACK + MED BALL RACK (CC BY 4.0 by MH, via Sketchfab)
       Two instances of the same .gltf:
         - Rack #1: dumbbells visible (default).      mirror-wall side
         - Rack #2: dumbbells hidden, med balls on it. cage-net side
       Real model dims: 170 × 50 × 85 cm (5.58 × 1.64 × 2.79 ft).
       Both at x=71..76.6 (along the back end of the gym strip).
    ────────────────────────────────────────────────────────────────── */
    function makeMedBallTexture(topColor) {
      const c = document.createElement('canvas');
      c.width = 1024; c.height = 512;
      const ctx = c.getContext('2d');
      // Top half: bright color
      ctx.fillStyle = topColor;
      ctx.fillRect(0, 0, c.width, c.height / 2);
      // Bottom half: black rubber
      ctx.fillStyle = '#15171a';
      ctx.fillRect(0, c.height / 2, c.width, c.height / 2);
      // Center stripe with TAP branding
      const stripeH = 70;
      ctx.fillStyle = '#15171a';
      ctx.fillRect(0, c.height / 2 - stripeH / 2, c.width, stripeH);
      ctx.fillStyle = '#ffffff';
      ctx.font = '900 38px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let i = 0; i < 4; i++) {
        ctx.fillText('TAP ATHLETES', c.width * (0.125 + i * 0.25), c.height / 2);
      }
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      return tex;
    }

    gltfLoader.load('../assets/equipment/dumbbell-rack/scene.gltf', (gltf) => {
      const proto = gltf.scene;
      proto.updateMatrixWorld(true);

      // Proto bbox (in the loaded model's own coord space) — used to compute
      // scale + center offset so the rack lands centered + bottom-on-floor.
      const protoBbox = new THREE.Box3().setFromObject(proto);
      const protoSize = new THREE.Vector3(); protoBbox.getSize(protoSize);
      const protoCenter = new THREE.Vector3(); protoBbox.getCenter(protoCenter);
      const longest = Math.max(protoSize.x, protoSize.y, protoSize.z);
      const scaleFactor = longest > 0 ? 5.58 / longest : 1;

      function placeRack(opts) {
        // Wrapper group sits at the world target (opts.x, 0, opts.z) and
        // owns the rotation. The rack inside is offset so its bbox center +
        // floor end up at the wrapper's origin.
        const wrapper = new THREE.Group();
        wrapper.position.set(opts.x, 0, opts.z);
        wrapper.rotation.y = opts.rotY || 0;
        scene.add(wrapper);

        const rack = proto.clone(true);
        rack.scale.setScalar(scaleFactor);
        rack.position.set(
          -protoCenter.x * scaleFactor,         // center horizontally
          -protoBbox.min.y * scaleFactor,       // sit bottom on floor
          -protoCenter.z * scaleFactor,         // center on depth
        );
        rack.traverse(c => {
          if (!c.isMesh) return;
          c.castShadow = true; c.receiveShadow = true;
          const matName = (c.material && c.material.name) || '';
          // The gltf's fabric mat is ~5.5×5.5 ft — much bigger than the rack
          // frame. Hide it and replace with a properly-sized custom mat below
          // so it doesn't poke through the building wall.
          if (matName === 'fabric') {
            c.visible = false;
          }
          if (opts.hideDumbbells && (matName === 'plastic' || matName === 'metal')) {
            c.visible = false;
          }
        });
        wrapper.add(rack);

        // Custom black floor mat sized to the rack frame footprint (5.7 × 1.9 ft).
        const matMesh = new THREE.Mesh(
          new THREE.BoxGeometry(5.7, 0.06, 1.9),
          new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.95, metalness: 0 })
        );
        matMesh.position.set(0, 0.03, 0);
        matMesh.receiveShadow = true;
        wrapper.add(matMesh);

        // Now compute the WORLD bbox so callers can place things relative to
        // the actual on-screen rack location, not the proto's local space.
        wrapper.updateMatrixWorld(true);
        const worldBbox = new THREE.Box3().setFromObject(wrapper);
        return worldBbox;
      }

      // Rack #1 — with dumbbells, against the mirror wall just past the squat rack
      placeRack({ x: 73.8, z: 23.7, hideDumbbells: false });

      // Rack #2 — med balls instead of dumbbells. Replaces the old primitive
      // plyo-ball rack at x=42..50, so centered at x=46 along the mirror wall.
      const r2bbox = placeRack({ x: 46, z: 23.7, hideDumbbells: true });

      // Med balls on Rack #2 — two rows (top: lighter/smaller, bottom: heavier/bigger)
      const medBallColors = ['#e8c84a', '#4a8acd', '#5fb959', '#a96cd4', '#cd4a4a']; // yellow/blue/green/purple/red
      const r2x1 = r2bbox.min.x, r2x2 = r2bbox.max.x;
      const r2y1 = r2bbox.min.y, r2y2 = r2bbox.max.y;
      const r2zC = (r2bbox.min.z + r2bbox.max.z) / 2;
      [
        { yFrac: 0.62, r: 0.28 }, // top tier — 2 lb-ish, smaller
        { yFrac: 0.20, r: 0.42 }, // bottom tier — 6 lb+, bigger
      ].forEach((tier) => {
        const y = r2y1 + (r2y2 - r2y1) * tier.yFrac;
        for (let i = 0; i < 5; i++) {
          const t = (i + 0.5) / 5;
          const x = r2x1 + t * (r2x2 - r2x1);
          const tex = makeMedBallTexture(medBallColors[i]);
          const ball = new THREE.Mesh(
            new THREE.SphereGeometry(tier.r, 32, 24),
            new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85, metalness: 0.05 })
          );
          ball.position.set(x, y + tier.r, r2zC);
          ball.castShadow = true;
          scene.add(ball);
        }
      });
    }, undefined, (err) => {
      console.warn('[dumbbell-rack.gltf] failed to load:', err);
    });

    /* ─────────────────────────────────────────────────────────────────
       WELCOME MAT — just inside the front door (x=4..6, z=7.375..10.375)
    ────────────────────────────────────────────────────────────────── */
    {
      const mat = new THREE.Mesh(new THREE.BoxGeometry(2, 0.04, 3), matMat);
      mat.position.set(5, 0.07, 8.875);
      scene.add(mat);
    }

    /* ─────────────────────────────────────────────────────────────────
       CONTROLS — orbit + walk
    ────────────────────────────────────────────────────────────────── */

    let mode = 'orbit';
    let activeCam = orbitCam;

    const orbit = new OrbitControls(orbitCam, renderer.domElement);
    orbit.target.set(40, 4, 12.5);
    orbit.enableDamping = true;
    orbit.dampingFactor = 0.08;
    orbit.maxPolarAngle = Math.PI * 0.49;
    orbit.minDistance = 5;
    orbit.maxDistance = 250;
    orbit.update();

    const walk = new PointerLockControls(walkCam, document.body);
    scene.add(walk.getObject());

    const keys = { w:false, a:false, s:false, d:false, shift:false };
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    const PLAYER_HEIGHT = 5.6;

    document.addEventListener('keydown', (e) => {
      if (mode !== 'walk') return;
      if (e.code === 'KeyW') keys.w = true;
      if (e.code === 'KeyA') keys.a = true;
      if (e.code === 'KeyS') keys.s = true;
      if (e.code === 'KeyD') keys.d = true;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = true;
    });
    document.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') keys.w = false;
      if (e.code === 'KeyA') keys.a = false;
      if (e.code === 'KeyS') keys.s = false;
      if (e.code === 'KeyD') keys.d = false;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = false;
    });

    const lockHint = document.getElementById('lock-hint');
    let lockSupported = !!document.body.requestPointerLock;
    lockHint.addEventListener('click', () => {
      if (!lockSupported) return;
      try { walk.lock(); } catch (_) { lockSupported = false; }
    });
    walk.addEventListener('lock', () => lockHint.classList.remove('show'));
    walk.addEventListener('unlock', () => { if (mode === 'walk') lockHint.classList.add('show'); });

    function setMode(newMode) {
      mode = newMode;
      activeCam = (mode === 'walk') ? walkCam : orbitCam;
      document.querySelectorAll('#mode-panel button[data-mode]').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === mode);
      });
      document.getElementById('help-orbit').style.display = (mode === 'orbit') ? '' : 'none';
      document.getElementById('help-walk').style.display = (mode === 'walk') ? '' : 'none';
      if (mode === 'walk') {
        lockHint.classList.add('show');
      } else {
        lockHint.classList.remove('show');
        if (walk.isLocked) walk.unlock();
      }
      document.getElementById('cam-info').textContent = mode;
    }

    function setPreset(preset) {
      if (preset === 'iso') {
        setMode('orbit');
        orbitCam.position.set(-35, 28, 55);
        orbit.target.set(40, 4, 12.5);
      } else if (preset === 'top') {
        setMode('orbit');
        orbitCam.position.set(40, 100, 12.501);
        orbit.target.set(40, 0, 12.5);
      } else if (preset === 'mound') {
        setMode('walk');
        // standing on Mound A, looking at its home plate (Plate A at z=5)
        walkCam.position.set(15, 5.6, 5);
        walkCam.lookAt(73, 4.5, 5);
      } else if (preset === 'plate') {
        setMode('walk');
        // behind home plate A (z=5), looking back at Mound A
        walkCam.position.set(75, 5.6, 5);
        walkCam.lookAt(8, 4.5, 5);
      } else if (preset === 'entry') {
        setMode('walk');
        walkCam.position.set(1.5, 5.6, 15.5);
        walkCam.lookAt(40, 5.6, 12.5);
      }
      orbit.update();
    }

    document.querySelectorAll('#mode-panel button').forEach(b => {
      b.addEventListener('click', () => {
        if (b.dataset.mode) setMode(b.dataset.mode);
        if (b.dataset.preset) setPreset(b.dataset.preset);
      });
    });

    // Bay door toggle
    const bayDoorBtn = document.getElementById('bay-door-toggle');
    bayDoorBtn.addEventListener('click', () => {
      bayDoorOpen = !bayDoorOpen;
      bayDoorBtn.classList.toggle('active', bayDoorOpen);
    });

    const clock = new THREE.Clock();
    function updateWalk(dt) {
      if (!walk.isLocked) return;
      const speed = (keys.shift ? 18 : 9);
      direction.z = Number(keys.w) - Number(keys.s);
      direction.x = Number(keys.d) - Number(keys.a);
      direction.normalize();

      velocity.x -= velocity.x * 10 * dt;
      velocity.z -= velocity.z * 10 * dt;

      if (keys.w || keys.s) velocity.z -= direction.z * speed * 8 * dt;
      if (keys.a || keys.d) velocity.x -= direction.x * speed * 8 * dt;

      walk.moveRight(-velocity.x * dt);
      walk.moveForward(-velocity.z * dt);

      const obj = walk.getObject();
      obj.position.x = Math.max(0.5, Math.min(79.5, obj.position.x));
      obj.position.z = Math.max(0.5, Math.min(24.5, obj.position.z));
      obj.position.y = PLAYER_HEIGHT;
    }

    window.addEventListener('resize', () => {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      orbitCam.aspect = w / h; orbitCam.updateProjectionMatrix();
      walkCam.aspect = w / h; walkCam.updateProjectionMatrix();
    });

    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      if (mode === 'walk') updateWalk(dt);
      else orbit.update();

      // Bay door roll-up animation: scale.y compresses the panel toward the
      // top of the opening; position.y shifts so the top stays pinned at ROLL_H.
      if (bayDoorGroup) {
        const target = bayDoorOpen ? 0 : 1;
        bayDoorState += (target - bayDoorState) * 0.08;
        const s = Math.max(bayDoorState, 0.01);
        bayDoorGroup.scale.y = s;
        bayDoorGroup.position.y = (2 - s) * bayDoorRollH / 2;
      }

      renderer.render(scene, activeCam);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
