<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TAP Athletes Pitching Academy — Facility Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --slate: #3a4a55;
    --slate-deep: #2a3640;
    --slate-mid: #4a5d6b;
    --slate-light: #5a6f7e;
    --powder: #b8d4e0;
    --powder-soft: #d4e4ed;
    --black: #0a0a0a;
    --rubber: #141414;
    --rubber-light: #1f1f1f;
    --turf: #4a7c4e;
    --turf-light: #5a8c5e;
    --turf-deep: #3a6c3e;
    --royal: #1e5fb8;
    --royal-deep: #164a96;
    --paper: #f5f8fb;
    --ink: #1a232b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: #e8edf2; }
  body {
    background: #e8edf2;
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .sheet {
    width: min(1800px, 100%);
    aspect-ratio: 3 / 2;
    background: var(--paper);
    position: relative;
    box-shadow: 0 30px 80px -20px rgba(58, 74, 85, 0.25), 0 4px 12px rgba(58, 74, 85, 0.08);
    overflow: hidden;
  }
  /* paper subtle grid */
  .sheet::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(58,74,85,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(58,74,85,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .sheet::after {
    content: '';
    position: absolute; inset: 0;
    border: 1px solid rgba(58,74,85,0.12);
    pointer-events: none;
  }
  svg { display: block; width: 100%; height: 100%; }

  /* SVG-friendly font setup is in <text> attrs */
</style>
</head>
<body>

<div class="sheet">
<svg viewBox="0 0 1800 1200" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">

  <defs>
    <!-- gradients -->
    <linearGradient id="wallTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4a5d6b"/>
      <stop offset="1" stop-color="#3a4a55"/>
    </linearGradient>
    <linearGradient id="wallSideL" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2a3640"/>
      <stop offset="1" stop-color="#3a4a55"/>
    </linearGradient>
    <linearGradient id="wallSideR" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3a4a55"/>
      <stop offset="1" stop-color="#2a3640"/>
    </linearGradient>
    <linearGradient id="wallBack" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3f515d"/>
      <stop offset="1" stop-color="#324049"/>
    </linearGradient>

    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>

    <linearGradient id="turfGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7fb3cf"/>
      <stop offset="1" stop-color="#3d6f8c"/>
    </linearGradient>

    <linearGradient id="moundTop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a6fc8"/>
      <stop offset="1" stop-color="#164a96"/>
    </linearGradient>
    <linearGradient id="moundSide" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e5fb8"/>
      <stop offset="1" stop-color="#0f3a78"/>
    </linearGradient>

    <linearGradient id="mirrorGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cfe1ea"/>
      <stop offset="0.5" stop-color="#e8f0f5"/>
      <stop offset="1" stop-color="#a8c4d2"/>
    </linearGradient>

    <linearGradient id="bathroomTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5a6f7e"/>
      <stop offset="1" stop-color="#42525e"/>
    </linearGradient>

    <!-- pill shadow -->
    <filter id="pillShadow" x="-20%" y="-20%" width="140%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3a4a55" flood-opacity="0.25"/>
    </filter>
    <filter id="bldgShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- TAP diamond emblem -->
    <symbol id="tapDiamond" viewBox="0 0 100 120">
      <g fill="none" stroke="currentColor" stroke-width="3.5">
        <path d="M50 6 L94 50 L50 94 L6 50 Z"/>
      </g>
      <text x="50" y="60" text-anchor="middle"
            font-family="Inter, sans-serif" font-weight="800" font-size="28"
            letter-spacing="2" fill="currentColor">TAP</text>
      <!-- home plate -->
      <path d="M38 102 L62 102 L62 110 L50 117 L38 110 Z"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
    </symbol>

    <!-- netting pattern (diagonal lattice) -->
    <pattern id="netting" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M0 14 L14 0 M-3 3 L3 -3 M11 17 L17 11" stroke="#1a1a1a" stroke-width="0.6" opacity="0.55"/>
      <path d="M0 0 L14 14 M-3 11 L3 17 M11 -3 L17 3" stroke="#1a1a1a" stroke-width="0.6" opacity="0.55"/>
    </pattern>

    <!-- turf texture (tiny stipple) -->
    <pattern id="turfDots" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="url(#turfGrad)"/>
      <circle cx="2" cy="2" r="0.5" fill="#2c5a73" opacity="0.6"/>
      <circle cx="5" cy="4" r="0.4" fill="#9ec6dc" opacity="0.5"/>
    </pattern>

    <!-- rubber floor stipple -->
    <pattern id="rubberTex" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="url(#floor)"/>
      <circle cx="4" cy="6" r="0.6" fill="#2a2a2a"/>
      <circle cx="14" cy="3" r="0.5" fill="#222"/>
      <circle cx="9" cy="13" r="0.7" fill="#2a2a2a"/>
      <circle cx="17" cy="16" r="0.5" fill="#222"/>
      <circle cx="2" cy="17" r="0.4" fill="#1e1e1e"/>
    </pattern>

  </defs>

  <!-- ============== HEADER ============== -->
  <g id="header">
    <!-- diamond logo -->
    <g transform="translate(70, 60)" color="#3a4a55">
      <use href="#tapDiamond" width="64" height="76"/>
    </g>

    <!-- wordmark -->
    <text x="156" y="98" font-family="Inter, sans-serif" font-weight="800" font-size="34"
          letter-spacing="3" fill="#3a4a55">TAP ATHLETES</text>
    <text x="156" y="128" font-family="Inter, sans-serif" font-weight="500" font-size="20"
          letter-spacing="6" fill="#5a6f7e">PITCHING ACADEMY</text>

    <!-- right-side title block -->
    <g transform="translate(1730, 60)">
      <text x="0" y="20" text-anchor="end"
            font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2"
            fill="#5a6f7e">DOC · FL-001 / REV A</text>
      <text x="0" y="42" text-anchor="end"
            font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2"
            fill="#5a6f7e">SCALE · 1/4" = 1'-0"</text>
      <text x="0" y="64" text-anchor="end"
            font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2"
            fill="#5a6f7e">SHEET · 1 OF 1</text>
    </g>

    <!-- divider -->
    <line x1="70" y1="160" x2="1730" y2="160" stroke="#3a4a55" stroke-width="1" opacity="0.35"/>

    <!-- title bar -->
    <text x="70" y="200" font-family="Inter, sans-serif" font-weight="700" font-size="44"
          letter-spacing="-0.5" fill="#1a232b">Facility Layout</text>
    <text x="70" y="232" font-family="Inter, sans-serif" font-weight="400" font-size="18"
          letter-spacing="0.5" fill="#5a6f7e">Elite pitching development. Built for the next level.</text>

    <!-- top-right footprint badge -->
    <g transform="translate(1730, 195)">
      <rect x="-200" y="-30" width="200" height="50" fill="#3a4a55"/>
      <text x="-100" y="-8" text-anchor="middle" font-family="JetBrains Mono, monospace"
            font-size="10" letter-spacing="3" fill="#b8d4e0">FOOTPRINT</text>
      <text x="-100" y="13" text-anchor="middle" font-family="Inter, sans-serif"
            font-weight="700" font-size="18" letter-spacing="2" fill="#fff">30' × 70' · 2,000 SF</text>
    </g>
  </g>

  <!-- ============== ISOMETRIC DIAGRAM ============== -->
  <!-- iso projection setup:
       facility footprint 30ft (x-axis, width) x 70ft (z-axis, depth)
       x scale: 14 px/ft along iso-x (right-down)
       z scale: 14 px/ft along iso-z (left-down)
       iso angle: 30 deg.
       Helper math (in <g transform>):
         iso point (x, z) at floor level (y=0):
           sx = ix * cos30 + iz * cos30  -> with sign: x to right, z to left
           sy = -ix * sin30 + iz * sin30
       I'll build a transform group anchored at the front corner of the building.
  -->

  <!-- big soft drop shadow under the building -->
  <ellipse cx="900" cy="1080" rx="640" ry="56" fill="#3a4a55" opacity="0.16"/>
  <ellipse cx="900" cy="1080" rx="540" ry="34" fill="#3a4a55" opacity="0.18"/>

  <!--
    Origin: front-LEFT corner of building, on floor.
    iso unit vectors (px per foot):
      ex  (along width, going to back-right side)  = ( 12.124, -7.0 )
      ez  (along depth, going to back-left side)   = (-12.124, -7.0 )
      ey  (vertical, up the page)                  = ( 0, -10 )

    Building 30 ft wide (along ex) x 70 ft deep (along ez).
    Wall height ~ 14 ft.

    front-left  (FL): (0,0)
    front-right (FR): 30*ex = (363.7, -210)
    back-left   (BL): 70*ez = (-848.7, -490)
    back-right  (BR): FR + BL = (-485, -700)
  -->

  <g id="building" transform="translate(1010, 1000)">

    <!-- ====== FLOOR (rubber) ====== -->
    <!-- floor polygon FL -> FR -> BR -> BL -->
    <polygon points="0,0 363.7,-210 -485,-700 -848.7,-490"
             fill="url(#rubberTex)" stroke="#000" stroke-width="0.5"/>

    <!-- subtle floor seams (rubber tile lines, every 5 ft along width and depth) -->
    <g opacity="0.18" stroke="#3a3a3a" stroke-width="0.6" fill="none">
      <!-- lines parallel to ex (from front edge to back edge) at every 5 ft of depth -->
      <g>
        <!-- depth = 5..65 every 5 ft  : start point = 5n * ez, end = 5n*ez + 30*ex -->
        <line x1="-60.6" y1="-35" x2="303.0" y2="-245"/>
        <line x1="-121.2" y1="-70" x2="242.4" y2="-280"/>
        <line x1="-181.9" y1="-105" x2="181.8" y2="-315"/>
        <line x1="-242.5" y1="-140" x2="121.2" y2="-350"/>
        <line x1="-303.1" y1="-175" x2="60.6" y2="-385"/>
        <line x1="-363.7" y1="-210" x2="0" y2="-420"/>
        <line x1="-424.3" y1="-245" x2="-60.6" y2="-455"/>
        <line x1="-485.0" y1="-280" x2="-121.2" y2="-490"/>
        <line x1="-545.6" y1="-315" x2="-181.9" y2="-525"/>
        <line x1="-606.2" y1="-350" x2="-242.5" y2="-560"/>
        <line x1="-666.8" y1="-385" x2="-303.1" y2="-595"/>
        <line x1="-727.4" y1="-420" x2="-363.7" y2="-630"/>
        <line x1="-788.1" y1="-455" x2="-424.4" y2="-665"/>
      </g>
      <!-- lines parallel to ez at every 5 ft of width -->
      <g>
        <line x1="60.6" y1="-35" x2="-788.1" y2="-525"/>
        <line x1="121.2" y1="-70" x2="-727.5" y2="-560"/>
        <line x1="181.9" y1="-105" x2="-666.8" y2="-595"/>
        <line x1="242.5" y1="-140" x2="-606.2" y2="-630"/>
        <line x1="303.1" y1="-175" x2="-545.6" y2="-665"/>
      </g>
    </g>

    <!-- ====== WALLS (left + back, with thickness) ====== -->
    <!-- wall thickness ~0.5 ft inward; wall height = 14 ft -->
    <!-- BACK wall: from BL to BR, height up
         BL = (-848.7, -490), BR = (-485, -700)
         top-BL = BL + 14*ey = (-848.7, -630)
         top-BR = BR + 14*ey = (-485, -840) -->
    <polygon points="-848.7,-490 -485,-700 -485,-840 -848.7,-630"
             fill="url(#wallBack)" stroke="#1f2830" stroke-width="1.2"/>

    <!-- LEFT wall: from FL to BL
         FL = (0,0), BL = (-848.7,-490)
         top-FL = (0,-140), top-BL = (-848.7,-630) -->
    <polygon points="0,0 -848.7,-490 -848.7,-630 0,-140"
             fill="url(#wallSideL)" stroke="#1f2830" stroke-width="1.2"/>

    <!-- wall thickness top caps (thin band at the top of each wall) -->
    <!-- top of back wall, slim slab -->
    <polygon points="-848.7,-630 -485,-840 -485,-844 -848.7,-634"
             fill="#5a6f7e"/>
    <!-- top of left wall slim slab -->
    <polygon points="0,-140 -848.7,-630 -848.7,-634 0,-144"
             fill="#5a6f7e"/>

    <!-- inner-corner crease where back+left walls meet (BL corner) -->
    <line x1="-848.7" y1="-490" x2="-848.7" y2="-630" stroke="#1a232b" stroke-width="1.2"/>

    <!-- ====== BRANDING WALL GRAPHICS ====== -->
    <!-- Back wall logo lockup, drawn on the back-wall plane.
         The back wall plane spans BL->BR horizontally; height up.
         A horizontal vector "u" along the back wall (per foot of width):
           u_back = (BR-BL)/30 = ( (363.7-0)/30 ?  actually BR-BL = (363.7, -210) ) / 30 = (12.124, -7)
         vertical "v" = (0,-10)
    -->
    <!-- big "TAP" + diamond on back wall, centered, ~5 ft above floor -->
    <g opacity="0.92">
      <!-- diamond emblem on back wall, centered -->
      <!-- center of back wall: midpoint between BL and BR raised 7 ft
           BL=(-848.7,-490), BR=(-485,-700). mid = (-666.85,-595). raise 7ft = +(0,-70) => (-666.85,-665).
           Now we'll draw a logo "decal" using a small rotated/skewed group.
           To stick it to the back-wall plane, apply a transform whose basis is u_back and v.
      -->
      <g transform="matrix(12.124, -7, 0, -10, -666.85, -595)">
        <!-- inside this matrix, x is feet along wall (right), y is feet up -->
        <!-- diamond: span ~3 ft, centered at (0, 7) ft -->
        <g transform="translate(-12, 6)" stroke="#b8d4e0" stroke-width="0.18" fill="none">
          <path d="M0 0 L1.5 1.5 L0 3 L-1.5 1.5 Z"/>
          <text x="0" y="2" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800"
                font-size="1" letter-spacing="0.05" fill="#b8d4e0" stroke="none">TAP</text>
        </g>
        <!-- horizontal lockup -->
        <text x="0" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800"
              font-size="1.7" letter-spacing="0.18" fill="#b8d4e0" stroke="none">TAP ATHLETES</text>
        <text x="0" y="3.8" text-anchor="middle" font-family="Inter, sans-serif" font-weight="500"
              font-size="0.95" letter-spacing="0.35" fill="#b8d4e0" stroke="none">PITCHING ACADEMY</text>
      </g>
    </g>

    <!-- left-wall stripe graphic above pitching lane (thin powder-blue stripe + repeating wordmark) -->
    <g opacity="0.78">
      <!-- left wall plane basis: along ez per foot = (-12.124, -7); vertical = (0,-10).
           Stripe runs from depth 8 ft to 62 ft, at height 9 ft -->
      <!-- thin stripe -->
      <polygon
        points="-96.99,-146 -751.69,-524 -751.69,-534 -96.99,-156"
        fill="#b8d4e0" opacity="0.85"/>
      <!-- wordmark repeated along left wall -->
      <g transform="matrix(-12.124, -7, 0, -10, -424.4, -335)">
        <text x="0" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700"
              font-size="1.4" letter-spacing="0.3" fill="#b8d4e0">TAP · TAP · TAP · TAP</text>
      </g>
    </g>

    <!-- ====== CENTRAL TAP LOGO INLAY ON FLOOR ====== -->
    <!-- Logo inlaid in the open front-central area of the floor, in front of training area / right of pitching lane.
         Logo center in feet: x=20 (from left), z=15 (from front). At floor level y=0.
         Iso position: 20*ex + 15*ez = (242.5,-140) + (-181.85,-105) = (60.65, -245)
    -->
    <g transform="translate(60.65,-245)">
      <!-- circular ring -->
      <ellipse cx="0" cy="0" rx="98" ry="56" fill="none" stroke="#b8d4e0" stroke-width="3" opacity="0.85"/>
      <ellipse cx="0" cy="0" rx="86" ry="49" fill="none" stroke="#b8d4e0" stroke-width="1" opacity="0.55"/>
      <!-- diamond -->
      <g opacity="0.95">
        <path d="M0,-32 L46,0 L0,32 L-46,0 Z" fill="none" stroke="#b8d4e0" stroke-width="3"/>
        <text x="0" y="-2" text-anchor="middle" font-family="Inter, sans-serif"
              font-weight="800" font-size="22" letter-spacing="3" fill="#b8d4e0"
              transform="scale(1, 0.58)">TAP</text>
        <!-- small home plate below -->
        <path d="M-12,18 L12,18 L12,24 L0,30 L-12,24 Z" fill="none" stroke="#b8d4e0"
              stroke-width="2" stroke-linejoin="round" transform="scale(1, 0.58) translate(0, 8)"/>
      </g>
    </g>

    <!-- ====== PITCHING LANE ====== -->
    <!--
      Lane occupies:
        width: from x=0 to x=12 (along ex)
        depth: from z=0 to z=70 (along ez)
        2 ft clearance from LEFT WALL — left wall is at x=0 (interior), so clearance puts lane starting at x=2.
        Actually the spec says "runs along the left wall with ~2ft clearance from the wall"
        So lane spans x = 2 .. 14 (12 ft wide).
    -->
    <!-- Turf runway: x in [2,14], z in [0,70] -->
    <g id="lane">
      <!-- compute corners (xa..xd):
           A: x=2,  z=0   -> 2*ex             = (24.25, -14)
           B: x=14, z=0   -> 14*ex            = (169.74,-98)
           C: x=14, z=70  -> 14*ex + 70*ez    = (169.74,-98) + (-848.7,-490) = (-678.96,-588)
           D: x=2,  z=70  -> 2*ex + 70*ez     = (24.25,-14) + (-848.7,-490) = (-824.45,-504)
      -->
      <!-- turf base -->
      <polygon points="24.25,-14 169.74,-98 -678.96,-588 -824.45,-504"
               fill="url(#turfGrad)" stroke="#2a4a5e" stroke-width="0.8"/>
      <!-- turf lighter stripes (mowing pattern) -->
      <g opacity="0.45">
        <!-- thin stripes parallel to ez at every 2 ft of width -->
        <polygon points="48.5,-28 72.74,-42 -776.0,-532 -800.2,-518" fill="#9ec6dc" opacity="0.5"/>
        <polygon points="96.99,-56 121.24,-70 -727.5,-560 -751.7,-546" fill="#9ec6dc" opacity="0.5"/>
        <polygon points="145.49,-84 169.74,-98 -678.96,-588 -703.21,-574" fill="#9ec6dc" opacity="0.5"/>
      </g>
      <!-- turf inner outline -->
      <polygon points="24.25,-14 169.74,-98 -678.96,-588 -824.45,-504"
               fill="none" stroke="#b8d4e0" stroke-width="0.8" opacity="0.45"/>

      <!-- ===== Netting cage frame ===== -->
      <!-- Frame posts at corners + intermediate.
           Net height ~ 11 ft.
           Posts at z=0,15,30,45,60,70; on both x=2 and x=14 sides; plus back net at z=70.
      -->
      <!-- helper: post height = 11 ft (110 px). Post at base (bx,by) -> top (bx, by-110) -->

      <!-- LEFT side posts (x=2): visible (front side facing camera-right? )
           Their bases:
           z=0:  (24.25, -14)
           z=15: 2*ex + 15*ez = (24.25,-14)+(-181.85,-105) = (-157.6,-119)
           z=30: (-339.45, -224)
           z=45: (-521.30, -329)
           z=60: (-703.15, -434)
           z=70: (-824.45, -504)
      -->
      <!-- RIGHT side posts (x=14):
           z=0:  (169.74, -98)
           z=15: (-12.11,-203)
           z=30: (-193.96,-308)
           z=45: (-375.81,-413)
           z=60: (-557.66,-518)
           z=70: (-678.96,-588)
      -->

      <!-- net panels (drawn first, behind posts) -->
      <!-- LEFT side net (vertical) — semi-transparent dark with netting pattern -->
      <polygon points="24.25,-14 -824.45,-504 -824.45,-614 24.25,-124"
               fill="url(#netting)" stroke="#0a0a0a" stroke-width="0.6" opacity="0.95"/>
      <polygon points="24.25,-14 -824.45,-504 -824.45,-614 24.25,-124"
               fill="#0a0a0a" opacity="0.18"/>

      <!-- RIGHT side net (vertical) -->
      <polygon points="169.74,-98 -678.96,-588 -678.96,-698 169.74,-208"
               fill="url(#netting)" stroke="#0a0a0a" stroke-width="0.6" opacity="0.95"/>
      <polygon points="169.74,-98 -678.96,-588 -678.96,-698 169.74,-208"
               fill="#0a0a0a" opacity="0.15"/>

      <!-- BACK net (across x at z=70) -->
      <polygon points="-824.45,-504 -678.96,-588 -678.96,-698 -824.45,-614"
               fill="url(#netting)" stroke="#0a0a0a" stroke-width="0.6" opacity="0.98"/>

      <!-- TOP net (very faint horizontal mesh suggestion) -->
      <polygon points="24.25,-124 169.74,-208 -678.96,-698 -824.45,-614"
               fill="url(#netting)" opacity="0.35"/>

      <!-- Frame rails (top edges) -->
      <g stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round">
        <line x1="24.25" y1="-124" x2="-824.45" y2="-614"/>
        <line x1="169.74" y1="-208" x2="-678.96" y2="-698"/>
        <line x1="24.25" y1="-124" x2="169.74" y2="-208"/>
